<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>競技かるた 練習管理 - 詠の庭 -</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&family=Noto+Serif+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-color: #8b0000;
        --accent-color: #d4af37;
        --bg-washi: #f5f5f0;
        --text-sumi: #1a1a1a;
      }

      body {
        font-family: "Sawarabi Mincho", "Noto Serif JP", serif;
        background-color: var(--bg-washi);
        background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png");
        color: var(--text-sumi);
        margin: 0;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #poemArea {
        width: 100%;
        max-width: 600px;
        background: rgba(255, 255, 255, 0.6);
        padding: 15px;
        border: 1px solid var(--accent-color);
        margin-bottom: 15px;
        text-align: center;
        box-sizing: border-box;
      }

      .container, #battleView, #timeslots {
        width: 100%;
        max-width: 600px;
        background: rgba(255, 255, 255, 0.9);
        padding: 20px;
        border: 1px solid #ccc;
        box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        box-sizing: border-box;
      }

      #userSection {
        width: 100%;
        max-width: 600px;
        display: flex;
        justify-content: flex-end;
        margin-bottom: 10px;
        font-size: 14px;
      }

      #calendar {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
      }

      .dayName { text-align: center; font-weight: bold; color: var(--primary-color); font-size: 12px; }

      .dateBtn {
        aspect-ratio: 5/7; background: #fff; border: 1px solid #ddd;
        display: flex; flex-direction: column; justify-content: space-between;
        align-items: center; padding: 6px 2px; cursor: pointer; transition: 0.2s;
      }

      .dateBtn.today { border: 2px solid var(--accent-color); background: #fffcf0; }
      .dateBtn.inactive { opacity: 0.3; background: transparent; pointer-events: none; }

      .room-label-text { width: 100%; font-size: 11px; font-weight: bold; text-align: center; padding: 2px 0; border-radius: 2px; }
      .room-A { background: #e3f2fd; color: #0d47a1; }
      .room-BC { background: #fffde7; color: #f57f17; }
      .room-ABC { background: #ffebee; color: #b71c1c; }

      .slot-item { border-bottom: 1px dashed #ccc; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
      .tab-header { display: flex; gap: 5px; margin-bottom: 20px; }
      .tab-btn { flex: 1; padding: 10px; border: 1px solid var(--accent-color); background: white; font-weight: bold; cursor: pointer; }
      .tab-btn.active { background: var(--accent-color); color: white; }
      .joined { background: var(--primary-color) !important; color: white !important; }
    </style>
  </head>

  <body>
    <div id="userSection">
      <div id="loginArea">
        <input id="userNameInput" placeholder="御名前" style="width: 80px; padding: 3px" />
        <button id="loginBtn">入室</button>
      </div>
      <div id="loggedInUser" style="display: none">
        <span id="loginStatus"></span>
        <button id="logoutBtn" style="margin-left: 10px">退室</button>
      </div>
    </div>

    <div id="poemArea">
      <div id="poemText">「ちはやぶる 神代もきかず 竜田川 からくれなゐに 水くくるとは」</div>
      <div id="poemAuthor" style="text-align: right; font-size: 0.8rem; margin-top: 5px">― 在原業平朝臣</div>
    </div>

    <div class="container" id="calendarView">
      <h2 style="text-align: center; margin-bottom: 15px">練習日和</h2>
      <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
        <button id="prevMonth">前月</button>
        <span id="monthYear" style="font-weight: bold; font-size: 1.1rem"></span>
        <button id="nextMonth">次月</button>
      </div>
      <div id="calendar"></div>
      <button id="battleBtn" style="width: 100%; margin-top: 20px; padding: 12px; border: 1px solid var(--primary-color); background: white; color: var(--primary-color); font-weight: bold;">⚔ 戦績帳を確認する</button>
    </div>

    <div id="hiddenWakaTrigger" style="cursor: pointer; opacity: 0.3; font-size: 0.8rem; display: inline-block; margin-left: 100px;" title="言の葉を紡ぐ">🌸</div>

    <div id="wakaModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; justify-content: center; align-items: center;">
      <div class="container" style="background: var(--bg-washi); padding: 25px; border: 2px solid var(--accent-color); position: relative; max-width: 450px; width: 90%; max-height: 80vh; overflow-y: auto;">
        <span id="closeWakaModal" style="position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 1.5rem;">×</span>
        <div class="tab-header">
          <button id="tabPost" class="tab-btn active" onclick="switchWakaTab('post')">和歌を詠む</button>
          <button id="tabManage" class="tab-btn" onclick="switchWakaTab('manage')">自分の投稿</button>
        </div>
        <div id="wakaPostForm">
          <textarea id="wakaInput" style="width: 100%; height: 100px; padding: 10px;" placeholder="五・七・五・七・七..."></textarea>
          <input type="text" id="wakaAuthorInput" placeholder="お名前（匿名可）" style="width: 100%; margin-top: 10px; padding: 8px;" />
          <button id="saveWakaBtn" style="width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; margin-top: 15px;">奉納する</button>
        </div>
        <div id="wakaManageList" style="display: none;"><div id="myWakaContainer"></div></div>
      </div>
    </div>

    <div id="timeslots" style="display: none">
      <button id="backBtn">← 戻る</button>
      <h2 id="selectedDate" style="text-align: center"></h2>
      <div id="slotContainer"></div>
      <div style="background: #f9f9f9; padding: 15px; border: 1px solid #ddd; margin-top: 20px;">
        <select id="roomSelect" style="width: 100%; padding: 10px;"><option value="none">予約なし</option><option value="A">和室A</option><option value="B・C">和室B＋C</option><option value="A・B・C">和室A＋B＋C</option></select>
        <textarea id="noteText" style="width: 100%; height: 60px; margin-top:10px;" placeholder="伝言板..."></textarea>
        <button id="saveNoteBtn" style="width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; margin-top: 10px;">保存</button>
      </div>
    </div>

    <script>
      const API_BASE_URL = window.location.origin;
      let currentUser = localStorage.getItem("userName") || null;
      let year = new Date().getFullYear();
      let month = new Date().getMonth();
      let notesByDate = {};

      async function displayRandomWaka() {
        try {
          const res = await fetch(`${API_BASE_URL}/api/waka`);
          const data = await res.json();
          if (data.wakas && data.wakas.length > 0) {
            const selected = data.wakas[Math.floor(Math.random() * data.wakas.length)];
            document.getElementById("poemText").textContent = `「${selected.text}」`;
            document.getElementById("poemAuthor").textContent = `― ${selected.author}`;
          }
        } catch (e) { console.log("Default waka displayed"); }
      }

      async function fetchNotes() {
        const res = await fetch(`${API_BASE_URL}/api/notes-by-month?year=${year}&month=${month + 1}`);
        const data = await res.json();
        notesByDate = {};
        if (data.notes) data.notes.forEach((n) => (notesByDate[n.date] = n));
      }

      function renderCalendar() {
        const cal = document.getElementById("calendar");
        cal.innerHTML = "";
        ["日", "月", "火", "水", "木", "金", "土"].forEach((d) => { cal.innerHTML += `<div class="dayName">${d}</div>`; });
        const first = new Date(year, month, 1).getDay();
        const last = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < first; i++) cal.innerHTML += `<div class="dateBtn inactive"></div>`;
        for (let d = 1; d <= last; d++) {
          const dateKey = `${year}-${month + 1}-${d}`;
          const note = notesByDate[dateKey];
          const btn = document.createElement("button");
          btn.className = "dateBtn";
          if (year === new Date().getFullYear() && month === new Date().getMonth() && d === new Date().getDate()) btn.classList.add("today");
          let roomHtml = "";
          if (note?.room && note.room !== "none") {
            let labelClass = "room-label-text " + (note.room === "A" ? "room-A" : note.room === "B・C" ? "room-BC" : "room-ABC");
            roomHtml = `<div class="${labelClass}">${note.room}</div>`;
          }
          btn.innerHTML = `<span>${d}</span>${roomHtml}`;
          btn.onclick = () => showDetail(d);
          cal.appendChild(btn);
        }
        document.getElementById("monthYear").textContent = `${year}年 ${month + 1}月`;
      }

      async function showDetail(day) {
        document.getElementById("calendarView").style.display = "none";
        document.getElementById("timeslots").style.display = "block";
        const dateKey = `${year}-${month + 1}-${day}`;
        document.getElementById("selectedDate").textContent = `${month + 1}月${day}日`;
        const slots = ["9:00～10:30", "10:45～12:00", "13:15～14:30", "14:45～16:00", "16:30～17:15", "17:30～19:00"];
        const container = document.getElementById("slotContainer");
        container.innerHTML = "読込中...";
        let html = "";
        for (const s of slots) {
          const res = await fetch(`${API_BASE_URL}/api/participants?date=${dateKey}&timeSlot=${s}`);
          const data = await res.json();
          const joined = data.participants?.includes(currentUser);
          html += `<div class="slot-item"><div><strong>${s}</strong><br><small>${data.participants?.join(", ") || ""}</small></div>
            <button class="${joined ? 'joined' : ''}" onclick="toggleJoin('${dateKey}', '${s}')">${joined ? '取消' : '参加'}</button></div>`;
        }
        container.innerHTML = html;
        document.getElementById("saveNoteBtn").onclick = async () => {
          await fetch(`${API_BASE_URL}/api/notes`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ date: dateKey, room: document.getElementById("roomSelect").value, text: document.getElementById("noteText").value }),
          });
          location.reload();
        };
      }

      async function toggleJoin(date, slot) {
        if (!currentUser) return alert("入室してください");
        await fetch(`${API_BASE_URL}/api/participate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ date, timeSlot: slot, userName: currentUser }),
        });
        showDetail(date.split("-")[2]);
      }

      function switchWakaTab(tab) {
        document.getElementById("wakaPostForm").style.display = tab === 'post' ? 'block' : 'none';
        document.getElementById("wakaManageList").style.display = tab === 'manage' ? 'block' : 'none';
        if (tab === 'manage') loadMyWakas();
      }

      async function loadMyWakas() {
        const container = document.getElementById("myWakaContainer");
        const res = await fetch(`${API_BASE_URL}/api/my-waka?userId=${encodeURIComponent(currentUser)}`);
        const data = await res.json();
        container.innerHTML = data.wakas?.map(w => `<div style="border-bottom:1px solid #ddd; padding:10px;">${w.text}<br><small>❤️ ${w.likes}</small></div>`).join("") || "投稿なし";
      }

      function init() {
        displayRandomWaka();
        if (currentUser) {
          document.getElementById("loginArea").style.display = "none";
          document.getElementById("loggedInUser").style.display = "block";
          document.getElementById("loginStatus").textContent = `門下生: ${currentUser}`;
        }
        document.getElementById("loginBtn").onclick = () => { const val = document.getElementById("userNameInput").value; if(val){localStorage.setItem("userName", val); location.reload();} };
        document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("userName"); location.reload(); };
        document.getElementById("backBtn").onclick = () => location.reload();
        document.getElementById("hiddenWakaTrigger").onclick = () => document.getElementById("wakaModal").style.display = "flex";
        document.getElementById("closeWakaModal").onclick = () => document.getElementById("wakaModal").style.display = "none";
        document.getElementById("saveWakaBtn").onclick = async () => {
          const text = document.getElementById("wakaInput").value;
          const author = document.getElementById("wakaAuthorInput").value || "匿名";
          await fetch(`${API_BASE_URL}/api/waka`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ text, author, userId: currentUser })
          });
          alert("奉納しました");
          location.reload();
        };
        fetchNotes().then(renderCalendar);
      }
      init();
    </script>
  </body>
</html>
